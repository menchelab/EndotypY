name: Deploy Docs
on:
  push:
    branches: [main]
jobs:
  build-and-deploy:
    runs-main: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v4
        with: {python-version: '3.10'}

      - name: Install Sphinx
        run: pip install sphinx sphinx-rtd-theme  # Add any other themes/plugins here

      - name: Build HTML
        run: sphinx-build -b html docs/source build/html

      - name: Deploy to GitHub Pages
        uses: peaceiris/actions-gh-pages@v3
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          publish_dir: ./build/html